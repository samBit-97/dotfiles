[metadata]
name = "tmux-new-session"
description = "Pick a directory from zoxide and create a new tmux session"
requirements = ["tmux", "zoxide"]

[source]
command = "zoxide query -l"
no_sort = true
frecency = false

[preview]
command = "eza --tree --color=always --level=2 '{}'"

[keybindings]
enter = "actions:create-session"

[actions.create-session]
description = "Create a new tmux session in the selected directory"
command = "sesh connect '{}'"
mode = "execute"
